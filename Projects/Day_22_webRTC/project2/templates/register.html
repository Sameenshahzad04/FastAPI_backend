<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Real-Time Chat</title>
    <link rel="stylesheet" href="/static/css/auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <h1> Create Account</h1>
            <p class="subtitle">Join the chat app</p>
            
            <form id="register-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required 
                           placeholder="Choose a username" minlength="3">
                    <small class="hint">At least 3 characters</small>
                </div>
                
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required 
                           placeholder="your@email.com">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required 
                           placeholder="Create a password" minlength="6">
                    <small class="hint">At least 6 characters</small>
                </div>
                
                <div class="form-group">
                    <label for="confirm_password">Confirm Password</label>
                    <input type="password" id="confirm_password" name="confirm_password" required 
                           placeholder="Confirm your password">
                </div>
                
                <button type="submit" class="btn btn-primary">Create Account</button>
                
                <p class="error" id="register-error"></p>
                <p class="success" id="register-success"></p>
            </form>
            
            <p class="switch-form">
                Already have an account? 
                <a href="/login.html">Login here</a>
            </p>
        </div>
    </div>

    <script src="/static/js/register.js"></script>
</body>
</html>
